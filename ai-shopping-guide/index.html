<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI导购助手 · 智能商品推荐</title>
<style>
:root {
  --bg: #faf8f5; --card: #ffffff; --card2: #fefbf7; --border: #e8e2d8;
  --text: #2c2416; --dim: #8a7e6b; --accent: #d4913e; --accent2: #e8784a;
  --gold: #c8872b; --warm: #f0a050; --teal: #2d9d8c; --rose: #d4687c;
  --green: #2d9d6c; --red: #d9534f;
  --shadow: 0 2px 16px rgba(60,40,20,0.06);
  --shadow-lg: 0 8px 40px rgba(60,40,20,0.10);
  --radius: 16px; --radius-sm: 10px;
  --font: 'Inter', 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
  --mono: 'SF Mono', 'JetBrains Mono', 'Consolas', monospace;
  --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 15px; line-height: 1.6; overflow-x: hidden; min-height: 100vh; }
.bg-orb { position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; filter: blur(120px); opacity: 0.5; }
.bg-orb-1 { width: 500px; height: 500px; background: #fce4c8; top: -150px; right: -100px; animation: float1 12s ease-in-out infinite; }
.bg-orb-2 { width: 400px; height: 400px; background: #f5e0d0; bottom: -100px; left: -80px; animation: float2 10s ease-in-out infinite; }
.bg-orb-3 { width: 300px; height: 300px; background: #e8e0d5; top: 50%; left: 50%; animation: float3 14s ease-in-out infinite; }
@keyframes float1 { 0%,100% { transform: translate(0,0) } 50% { transform: translate(-40px,30px) } }
@keyframes float2 { 0%,100% { transform: translate(0,0) } 50% { transform: translate(30px,-25px) } }
@keyframes float3 { 0%,100% { transform: translate(0,0) } 50% { transform: translate(-20px,-20px) } }
.app { position: relative; z-index: 1; max-width: 1400px; margin: 0 auto; padding: 24px 20px 60px; }
.topbar { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; background: rgba(255,255,255,0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-radius: 99px; border: 1px solid var(--border); margin-bottom: 20px; position: sticky; top: 12px; z-index: 100; box-shadow: var(--shadow); }
.topbar-logo { font-weight: 800; font-size: 15px; color: var(--accent); letter-spacing: -0.5px; }
.section-head { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.section-icon { width: 34px; height: 34px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; background: #fef0e6; color: var(--accent2); }
.section-title { font-size: 18px; font-weight: 700; color: var(--text); letter-spacing: -0.5px; }
.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
@keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.layout { display: grid; grid-template-columns: 1fr 420px; gap: 20px; margin: 16px 0; }
.chat-panel { display: flex; flex-direction: column; height: 600px; }
.chat-messages { flex: 1; overflow-y: auto; padding: 16px; background: var(--card2); border-radius: var(--radius); margin-bottom: 12px; display: flex; flex-direction: column; gap: 12px; }
.chat-bubble { max-width: 85%; padding: 12px 16px; border-radius: 14px; font-size: 14px; line-height: 1.65; animation: fadeIn 0.3s ease; }
.chat-bubble.user { align-self: flex-end; background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
.chat-bubble.ai { align-self: flex-start; background: var(--card); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
.chat-input-row { display: flex; gap: 8px; }
.chat-input-row input { flex: 1; padding: 12px 16px; border-radius: 99px; border: 1px solid var(--border); font-size: 14px; font-family: var(--font); background: var(--card); outline: none; transition: var(--transition); }
.chat-input-row input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(212,145,62,0.1); }
.chat-input-row button { padding: 10px 24px; border-radius: 99px; background: var(--accent); color: #fff; border: none; cursor: pointer; font-weight: 600; font-family: var(--font); font-size: 14px; transition: var(--transition); }
.chat-input-row button:hover { background: var(--gold); }
.chat-input-row button:disabled { opacity: 0.5; cursor: not-allowed; }

.chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
.chip { padding: 6px 14px; border-radius: 99px; border: 1px solid var(--border); background: var(--card); cursor: pointer; font-size: 12px; font-family: var(--font); color: var(--dim); transition: var(--transition); }
.chip:hover { background: #fef5eb; color: var(--accent); border-color: var(--accent); }

.rec-panel { display: flex; flex-direction: column; gap: 12px; max-height: 600px; overflow-y: auto; }
.rec-card { background: var(--card); border-radius: var(--radius); padding: 18px 20px; box-shadow: var(--shadow); border: 1px solid transparent; transition: var(--transition); animation: slideIn 0.4s ease forwards; }
.rec-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: var(--shadow-lg); }
.rec-card:nth-child(1) { animation-delay: 0.1s; }
.rec-card:nth-child(2) { animation-delay: 0.2s; }
.rec-card:nth-child(3) { animation-delay: 0.3s; }
.rec-card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.rec-card-emoji { font-size: 28px; }
.rec-card-name { font-weight: 700; font-size: 15px; color: var(--text); flex: 1; }
.rec-card-price { font-size: 18px; font-weight: 800; color: var(--accent2); }
.rec-card-original { font-size: 12px; color: var(--dim); text-decoration: line-through; margin-left: 4px; }
.rec-card .match-bar { width: 100%; height: 6px; background: var(--border); border-radius: 3px; margin: 8px 0; overflow: hidden; }
.rec-card .match-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width 0.5s ease; }
.rec-card .match-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--dim); }
.rec-card .reason { font-size: 12.5px; color: var(--dim); line-height: 1.6; margin-top: 6px; }
.rec-card .reason::before { content: '💡 '; }
.rec-card .tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
.tag { padding: 4px 12px; border-radius: 99px; font-size: 11px; font-weight: 500; display: inline-flex; align-items: center; gap: 4px; }
.tag-accent { background: #fef5eb; color: var(--accent); border: 1px solid rgba(212,145,62,0.2); }

.rec-breakdown { background: var(--card); border-radius: var(--radius); padding: 16px 20px; box-shadow: var(--shadow); }
.rec-breakdown h4 { font-size: 12px; font-weight: 700; letter-spacing: 1px; color: var(--accent); margin-bottom: 10px; }
.rec-breakdown .strategy-row { display: flex; align-items: center; gap: 8px; margin: 6px 0; font-size: 12px; }
.rec-breakdown .strategy-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.rec-breakdown .strategy-bar { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
.rec-breakdown .strategy-fill { height: 100%; border-radius: 2px; }

.profile-bar { display: flex; align-items: center; gap: 8px; padding: 10px 16px; background: var(--card); border-radius: var(--radius-sm); box-shadow: var(--shadow); margin-bottom: 14px; flex-wrap: wrap; }
.profile-bar select { padding: 6px 12px; border-radius: 99px; border: 1px solid var(--border); font-size: 12px; font-family: var(--font); background: var(--card2); cursor: pointer; }
.empty-state { text-align: center; padding: 40px 20px; color: var(--dim); }
.empty-state .icon { font-size: 48px; margin-bottom: 12px; opacity: 0.6; }

@media (max-width: 900px) { .layout { grid-template-columns: 1fr; } .rec-panel { max-height: none; } }
@media (max-width: 768px) {
  .app { padding: 10px; }
  .topbar { flex-wrap: wrap; gap: 6px; justify-content: center; border-radius: 20px; padding: 10px 14px; }
  .topbar-logo { font-size: 13px; }
  .topbar a { font-size: 10px; padding: 4px 10px; }
  .section-title { font-size: 15px; }
  .chat-panel { height: 450px; }
  .chat-bubble { max-width: 92%; font-size: 13px; }
  .chips { gap: 4px; }
  .chip { padding: 5px 10px; font-size: 11px; }
  .chat-input-row input { font-size: 13px; padding: 10px 12px; }
  .chat-input-row button { padding: 8px 16px; font-size: 13px; }
  .profile-bar { flex-direction: column; align-items: stretch; }
  .rec-card { padding: 14px 16px; }
  .rec-card-name { font-size: 13px; }
  .rec-card-price { font-size: 15px; }
}
</style>
</head>
<body>
<div class="bg-orb bg-orb-1"></div><div class="bg-orb bg-orb-2"></div><div class="bg-orb bg-orb-3"></div>

<div class="app">
<nav class="topbar"><span class="topbar-logo">蔡子贤 · AI导购助手</span><div><a href="#" id="backToResume" style="text-decoration:none;font-size:12px;color:var(--dim);padding:6px 14px;border-radius:99px;border:1px solid var(--border);transition:var(--transition);margin-right:8px">← 返回简历</a><a href="#" id="adminLink" style="text-decoration:none;font-size:12px;color:var(--dim);padding:6px 14px;border-radius:99px;border:1px solid var(--border);transition:var(--transition)">⚙️ 管理后台</a></div></nav>

<div class="section-head"><div class="section-icon">🧭</div><h2 class="section-title">AI导购助手 · 智能商品推荐系统</h2></div>

<div class="profile-bar">
  <span style="font-size:13px;font-weight:600;color:var(--text)">模拟用户:</span>
  <select id="profileSelect" onchange="switchProfile()"><option value="">不指定（对话中理解偏好）</option></select>
  <span style="font-size:11px;color:var(--dim)">切换不同用户画像查看推荐差异</span>
</div>

<div class="layout">
  <div class="chat-panel">
    <div class="chips">
      <button class="chip" onclick="quickAsk('我是新手，想找便宜点的入门课程')">新手入门</button>
      <button class="chip" onclick="quickAsk('我想增肌，推荐蛋白粉和装备')">增肌补给</button>
      <button class="chip" onclick="quickAsk('想减肥，推荐适合在家用的装备')">减脂装备</button>
      <button class="chip" onclick="quickAsk('给我推荐瑜伽相关的课程和产品')">瑜伽推荐</button>
      <button class="chip" onclick="quickAsk('有没有恢复按摩类的产品？')">运动恢复</button>
    </div>
    <div class="chat-messages" id="chatMessages">
      <div class="chat-bubble ai">👋 你好！我是<b>乐刻AI导购助手小乐</b>。<br>无论你是健身新手想找入门课程，还是资深玩家需要专业装备——告诉我你的需求，我来帮你精准匹配最合适的产品。<br><br><span style="font-size:12px;color:var(--dim)">💡 试试点击下面的快捷提问，或直接告诉我你的健身目标和预算～</span></div>
    </div>
    <div class="chat-input-row">
      <input type="text" id="chatInput" placeholder="描述你的健身需求和预算..." onkeydown="if(event.key==='Enter')sendMsg()">
      <button onclick="sendMsg()" id="sendBtn">发送</button>
    </div>
  </div>
  <div class="rec-panel" id="recPanel">
    <div class="empty-state"><div class="icon">🧭</div><div>告诉我你的需求<br>我会实时推荐最匹配的产品</div><div style="font-size:11px;margin-top:6px;color:var(--dim)">推荐策略: RFM画像 + 协同过滤 + LLM语义</div></div>
  </div>
</div>
</div>

<script>
var API_BASE = '';
document.getElementById('backToResume').href = '/';
document.getElementById('adminLink').href = API_BASE + '/admin';

var sessionId = localStorage.getItem('sg_session') || '';
var isStreaming = false;

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

async function loadProfiles() {
  try {
    var r = await fetch(API_BASE + '/api/shopping-guide/profiles');
    var data = await r.json();
    var sel = document.getElementById('profileSelect');
    data.profiles.forEach(function(p) {
      var opt = document.createElement('option');
      opt.value = p.id;
      opt.textContent = p.name + ' (' + p.rfm_segment + ')';
      sel.appendChild(opt);
    });
  } catch(e) { console.error(e); }
}

function switchProfile() {
  var sel = document.getElementById('profileSelect');
  if (sel.value) {
    document.getElementById('chatMessages').innerHTML = '';
    var p = sel.options[sel.selectedIndex].text;
    addMsg('ai', '👋 已切换至用户画像: <b>' + p + '</b><br>开始对话吧，我会基于该用户的偏好和消费行为进行推荐。');
  }
}

function addMsg(role, text) {
  var div = document.createElement('div');
  div.className = 'chat-bubble ' + role;
  div.innerHTML = text;
  document.getElementById('chatMessages').appendChild(div);
  document.getElementById('chatMessages').scrollTop = document.getElementById('chatMessages').scrollHeight;
  return div;
}

async function sendMsg() {
  if (isStreaming) return;
  var input = document.getElementById('chatInput');
  var msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  addMsg('user', msg);
  isStreaming = true;
  document.getElementById('sendBtn').disabled = true;

  var aiDiv = addMsg('ai', '<span class="spinner"></span> 正在分析需求并匹配商品...');
  var fullText = '';

  try {
    var profileId = document.getElementById('profileSelect').value;
    var resp = await fetch(API_BASE + '/api/shopping-guide/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({session_id: sessionId, message: msg, user_profile_id: profileId}),
    });
    var reader = resp.body.getReader();
    var decoder = new TextDecoder();
    var buffer = '';

    while (true) {
      var result = await reader.read();
      if (result.done) break;
      buffer += decoder.decode(result.value, {stream: true});
      var lines = buffer.split('\n');
      buffer = lines.pop() || '';
      var eventType = '';
      for (var i = 0; i < lines.length; i++) {
        var line = lines[i];
        if (line.startsWith('event: ')) { eventType = line.slice(7); continue; }
        if (!line.startsWith('data: ')) continue;
        try {
          var data = JSON.parse(line.slice(6));
          if (eventType === 'token' && data.text) {
            fullText += data.text;
            aiDiv.innerHTML = formatMarkdown(fullText);
            document.getElementById('chatMessages').scrollTop = document.getElementById('chatMessages').scrollHeight;
          } else if (eventType === 'recommendations' && data.items) {
            renderRecommendations(data.items);
          } else if (eventType === 'pipeline' && data.preferences) {
            updateBreakdown(data);
          } else if (eventType === 'done') {
            sessionId = data.session_id;
            localStorage.setItem('sg_session', sessionId);
          }
        } catch(e) {}
      }
    }
    if (!fullText) aiDiv.innerHTML = '抱歉，回复出错了，请重试。';
  } catch(e) {
    aiDiv.innerHTML = '⚠️ 请求失败：' + e.message;
  }
  isStreaming = false;
  document.getElementById('sendBtn').disabled = false;
}

function renderRecommendations(items) {
  var panel = document.getElementById('recPanel');
  panel.innerHTML = '';
  if (!items || items.length === 0) {
    panel.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><div>暂无匹配商品<br><span style="font-size:11px;color:var(--dim)">试试换个问法～</span></div></div>';
    return;
  }
  items.forEach(function(item, i) {
    var card = document.createElement('div');
    card.className = 'rec-card';
    card.style.animationDelay = (i * 0.1) + 's';
    var tags = (item.tags||[]);
    if (typeof tags === 'string') tags = tags.split(',').filter(Boolean);
    var discount = item.original_price > item.price ? '<span class="rec-card-original">¥' + item.original_price + '</span>' : '';
    var score = (item.match_score || 0.8) * 100;
    card.innerHTML = '<div class="rec-card-header"><span class="rec-card-emoji">' + (item.emoji || '📦') + '</span><span class="rec-card-name">' + item.name + '</span><span><span class="rec-card-price">¥' + item.price + '</span>' + discount + '</span></div>' +
      '<div class="tags">' + tags.map(function(t){ return '<span class="tag tag-accent">' + (typeof t==='string'?t.trim():t) + '</span>'; }).join('') + '</div>' +
      '<div class="match-bar"><div class="match-fill" style="width:' + score + '%"></div></div>' +
      '<div class="match-label"><span>匹配度</span><span style="font-weight:700;color:var(--accent)">' + score.toFixed(0) + '%</span></div>' +
      '<div class="reason">' + (item.reason||'') + '</div>';
    panel.appendChild(card);
  });
  panel.insertAdjacentHTML('beforeend', '<div class="rec-breakdown" id="breakdownBox"><h4>📊 推荐策略依据</h4><div style="font-size:12px;color:var(--dim)">等待分析完成...</div></div>');
}

function updateBreakdown(data) {
  var box = document.getElementById('breakdownBox');
  if (!box) return;
  var prefs = data.preferences || {};
  box.innerHTML = '<h4>📊 推荐策略依据</h4>' +
    '<div class="strategy-row"><span class="strategy-dot" style="background:var(--accent)"></span><span>RFM画像</span><span style="flex:1"></span><span style="font-size:11px;color:var(--dim)">40%</span></div>' +
    '<div class="strategy-row"><div class="strategy-bar"><div class="strategy-fill" style="width:40%;background:var(--accent)"></div></div></div>' +
    '<div class="strategy-row"><span class="strategy-dot" style="background:var(--teal)"></span><span>协同过滤</span><span style="flex:1"></span><span style="font-size:11px;color:var(--dim)">25%</span></div>' +
    '<div class="strategy-row"><div class="strategy-bar"><div class="strategy-fill" style="width:25%;background:var(--teal)"></div></div></div>' +
    '<div class="strategy-row"><span class="strategy-dot" style="background:var(--accent2)"></span><span>LLM语义匹配</span><span style="flex:1"></span><span style="font-size:11px;color:var(--dim)">35%</span></div>' +
    '<div class="strategy-row"><div class="strategy-bar"><div class="strategy-fill" style="width:35%;background:var(--accent2)"></div></div></div>' +
    '<div style="margin-top:10px;font-size:11px;color:var(--dim)">检测偏好: ' + (prefs.category||'?') + ' · ' + (prefs.goal||'?') + ' · ' + (prefs.budget||'?') + '预算 · ' + (prefs.level||'?') + '水平</div>';
}

function quickAsk(text) { document.getElementById('chatInput').value = text; sendMsg(); }
function formatMarkdown(text) { return text.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>').replace(/\n/g, '<br>'); }

loadProfiles();
</script>
</body>
</html>
