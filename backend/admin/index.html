<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理后台 · AI产品演示系统</title>
<style>
/* ══════════════════════════════════════════════════════════
   PREMIUM ADMIN PANEL — Dual-Project · Rich Interactions
   ══════════════════════════════════════════════════════════ */
:root {
  --bg: #f7f6f3; --surface: #ffffff; --surface2: #faf9f6; --border: #e8e3d8;
  --text: #1f1a0e; --text2: #6b6353; --text3: #9b9383;
  --cs: #d4913e; --cs-light: #fef5eb; --cs-bg: rgba(212,145,62,0.06);
  --sg: #2d9d8c; --sg-light: #e8f6f4; --sg-bg: rgba(45,157,140,0.06);
  --danger: #d4687c; --danger-light: #fef0f3;
  --shadow-sm: 0 1px 4px rgba(40,20,0,0.04);
  --shadow: 0 1px 8px rgba(40,20,0,0.06);
  --shadow-lg: 0 4px 24px rgba(40,20,0,0.10);
  --radius: 14px; --radius-sm: 10px; --radius-xs: 6px;
  --font: 'Inter', 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
  --mono: 'SF Mono', 'JetBrains Mono', 'Consolas', monospace;
  --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.5;display:flex;min-height:100vh}
a{color:inherit;text-decoration:none}

/* ═══════ SIDEBAR ═══════ */
.sidebar{width:250px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;overflow-y:auto;transition:transform .3s ease}
.sidebar-brand{padding:22px 22px 14px;font-size:17px;font-weight:800;letter-spacing:-0.5px;color:var(--text);display:flex;align-items:center;gap:8px}
.sidebar-brand span{color:var(--cs)}
.sidebar-section{padding:8px 0}
.sidebar-label{padding:18px 22px 6px;font-size:10px;font-weight:700;letter-spacing:1.5px;color:var(--text3);text-transform:uppercase}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:10px 22px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .15s ease;border-left:3px solid transparent;margin:1px 0;position:relative}
.sidebar-item:hover{background:var(--surface2);color:var(--text)}
.sidebar-item.active{color:var(--cs);background:var(--cs-bg);border-left-color:var(--cs);font-weight:600}
.sidebar-item.sg-item.active{color:var(--sg);background:var(--sg-bg);border-left-color:var(--sg)}
.sidebar-item .badge{position:absolute;right:16px;top:50%;transform:translateY(-50%);padding:2px 7px;border-radius:99px;font-size:10px;font-weight:700;line-height:1.4}
.badge-cs{background:var(--cs-light);color:var(--cs)}
.sidebar-item.active .badge-cs{background:var(--cs);color:#fff}
.badge-sg{background:var(--sg-light);color:var(--sg)}
.sidebar-item.sg-item.active .badge-sg{background:var(--sg);color:#fff}
.sidebar-divider{margin:8px 16px;border-top:1px solid var(--border)}

/* ═══════ MAIN ═══════ */
.main{margin-left:250px;flex:1;padding:28px 32px;min-width:0}
.page{display:none;animation:pageIn .35s ease}
.page.active{display:block}
@keyframes pageIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.page-title{font-size:22px;font-weight:700;letter-spacing:-0.5px}
.page-actions{display:flex;gap:8px;flex-wrap:wrap}

/* ═══════ STATS CARDS ═══════ */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.stat-card{background:var(--surface);border-radius:var(--radius);padding:20px 22px;box-shadow:var(--shadow);transition:var(--transition);border:1px solid transparent;cursor:default;position:relative;overflow:hidden}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);border-color:var(--border)}
.stat-card::before{content:'';position:absolute;top:0;left:0;width:100%;height:3px;opacity:0;transition:opacity .3s}
.stat-card:hover::before{opacity:1}
.stat-card.cs::before{background:linear-gradient(90deg,var(--cs),#f0a050)}
.stat-card.sg::before{background:linear-gradient(90deg,var(--sg),#5cc4b3)}
.stat-num{font-size:32px;font-weight:800;font-family:var(--mono);line-height:1.1}
.stat-card.cs .stat-num{color:var(--cs)}
.stat-card.sg .stat-num{color:var(--sg)}
.stat-label{font-size:11px;color:var(--text3);margin-top:4px;font-weight:500}

/* ═══════ CARDS ═══════ */
.card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:16px;overflow:hidden}
.card-header{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:10px}
.card-title{font-size:15px;font-weight:700}
.card-body{padding:18px 22px}
.card-tools{display:flex;align-items:center;gap:8px;flex-wrap:wrap}

/* ═══════ BUTTONS ═══════ */
.btn{padding:8px 16px;border-radius:99px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:12px;font-family:var(--font);font-weight:600;color:var(--text);transition:var(--transition);display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.btn:hover{background:var(--surface2);transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.btn-cs{background:var(--cs);color:#fff;border-color:var(--cs)}
.btn-cs:hover{background:#c8872b;border-color:#c8872b}
.btn-sg{background:var(--sg);color:#fff;border-color:var(--sg)}
.btn-sg:hover{background:#238a7a;border-color:#238a7a}
.btn-outline-cs{color:var(--cs);border-color:rgba(212,145,62,0.3);background:var(--cs-light)}
.btn-outline-cs:hover{background:var(--cs);color:#fff}
.btn-outline-sg{color:var(--sg);border-color:rgba(45,157,140,0.3);background:var(--sg-light)}
.btn-outline-sg:hover{background:var(--sg);color:#fff}
.btn-danger{color:var(--danger);border-color:rgba(212,104,124,0.3)}
.btn-danger:hover{background:var(--danger);color:#fff;border-color:var(--danger)}
.btn-sm{padding:5px 11px;font-size:11px}
.btn-xs{padding:3px 8px;font-size:10px;border-radius:6px}
.btn-group{display:flex;gap:4px}

/* ═══════ FORMS ═══════ */
input,textarea,select{padding:9px 13px;border-radius:var(--radius-xs);border:1px solid var(--border);font-size:13px;font-family:var(--font);background:var(--surface);outline:none;transition:var(--transition);width:100%;color:var(--text)}
input:focus,textarea:focus,select:focus{border-color:var(--cs);box-shadow:0 0 0 3px rgba(212,145,62,0.08)}
textarea{resize:vertical;min-height:120px;font-family:var(--mono);font-size:12px;line-height:1.8}
label{display:block;font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px}
.form-group{margin-bottom:14px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-inline{display:flex;align-items:flex-end;gap:10px;flex-wrap:wrap}
.form-inline .form-group{flex:1;min-width:150px}

/* ═══════ TABLES ═══════ */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:11px 14px;text-align:left;border-bottom:1px solid var(--border)}
th{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;white-space:nowrap;background:var(--surface2)}
tr:hover td{background:var(--surface2)}
td .truncate{max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block}

/* ═══════ TAGS / BADGES ═══════ */
.tag{display:inline-flex;align-items:center;gap:3px;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600;white-space:nowrap}
.tag-cs{background:var(--cs-light);color:var(--cs);border:1px solid rgba(212,145,62,0.2)}
.tag-sg{background:var(--sg-light);color:var(--sg);border:1px solid rgba(45,157,140,0.2)}
.tag-neutral{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.tag-danger{background:var(--danger-light);color:var(--danger)}

/* ═══════ MODAL ═══════ */
.modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(20,10,0,0.35);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
.modal-overlay.open{opacity:1;pointer-events:auto}
.modal{background:var(--surface);border-radius:var(--radius);width:min(680px,92vw);max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(30,15,0,0.18);padding:24px 28px;animation:modalIn .35s ease}
@keyframes modalIn{from{transform:translateY(24px) scale(.97);opacity:0}to{transform:translateY(0) scale(1);opacity:1}}
.modal h3{font-size:18px;font-weight:700;margin-bottom:18px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.modal .form-row{grid-template-columns:1fr 1fr}

/* ═══════ TOAST ═══════ */
.toast-container{position:fixed;top:20px;right:20px;z-index:300;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 20px;border-radius:99px;font-size:13px;font-weight:600;color:#fff;box-shadow:0 6px 24px rgba(0,0,0,0.15);animation:toastIn .3s ease;display:flex;align-items:center;gap:8px}
.toast-success{background:var(--sg)}
.toast-error{background:var(--danger)}
.toast-info{background:var(--cs)}
@keyframes toastIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}

/* ═══════ EMPTY STATE ═══════ */
.empty{text-align:center;padding:48px 20px;color:var(--text3)}
.empty-icon{font-size:48px;margin-bottom:12px;opacity:.5}
.empty-text{font-size:13px}

/* ═══════ PAGINATION ═══════ */
.pagination{display:flex;justify-content:center;align-items:center;gap:6px;margin-top:14px;font-size:12px;color:var(--text3)}
.pagination a{color:var(--cs);cursor:pointer;padding:4px 8px}
.pagination a:hover{text-decoration:underline}

/* ═══════ CONFIG GRID ═══════ */
.config-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.config-item{background:var(--surface2);border-radius:var(--radius-sm);padding:16px 18px;border:1px solid var(--border)}
.config-item label{font-size:11px;margin-bottom:4px}
.config-item .config-val{font-size:24px;font-weight:800;font-family:var(--mono)}
.config-item .config-hint{font-size:11px;color:var(--text3);margin-top:4px}

/* ═══════ RESPONSIVE ═══════ */
.menu-toggle{display:none;position:fixed;top:12px;left:12px;z-index:110;width:40px;height:40px;border-radius:50%;background:var(--surface);border:1px solid var(--border);cursor:pointer;font-size:18px;box-shadow:var(--shadow);align-items:center;justify-content:center}
@media(max-width:900px){
  .menu-toggle{display:flex}
  .sidebar{transform:translateX(-100%);box-shadow:var(--shadow-lg)}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0;padding:16px}
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .form-row{grid-template-columns:1fr}
  .page-header{flex-direction:column;align-items:flex-start}
  .page-title{font-size:18px}
  .card-header{flex-direction:column;align-items:flex-start;gap:8px}
  .card-tools{width:100%;flex-wrap:wrap}
  .card-tools input,.card-tools select{flex:1;min-width:120px}
  .config-grid{grid-template-columns:1fr}
  table{font-size:11px}
  th,td{padding:6px 8px}
  .modal{width:96vw;padding:16px 14px}
  .form-inline{flex-direction:column}
}

/* ═══════ MISC ═══════ */
.tab-bar{display:flex;gap:2px;padding:4px;background:var(--surface2);border-radius:99px;margin-bottom:16px;width:fit-content}
.tab-btn{padding:7px 18px;border-radius:99px;border:none;cursor:pointer;font-size:12px;font-weight:600;font-family:var(--font);background:transparent;color:var(--text3);transition:var(--transition)}
.tab-btn.active{background:var(--surface);color:var(--text);box-shadow:var(--shadow-sm)}
.sg .tab-btn.active{color:var(--sg)}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
code{font-size:11px;background:var(--surface2);padding:2px 6px;border-radius:3px;font-family:var(--mono)}
.hint{padding:10px 14px;background:#fffcf5;border-radius:var(--radius-sm);font-size:11px;color:var(--text3);border-left:3px solid var(--cs);margin-top:12px}
</style>
</head>
<body>
<button class="menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>

<!-- ════════════════ SIDEBAR ════════════════ -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand">⚡<span>AI</span> 管理后台</div>
  <div class="sidebar-label">总览</div>
  <div class="sidebar-item active" data-page="dashboard">📊 仪表盘</div>

  <div class="sidebar-divider"></div>
  <div class="sidebar-label">🤖 AI 智能客服</div>
  <div class="sidebar-item" data-page="cs-kb">📚 知识库 <span class="badge badge-cs" id="csKbCount">-</span></div>
  <div class="sidebar-item" data-page="cs-prompts">✏️ Prompt 模板</div>
  <div class="sidebar-item" data-page="cs-intents">🎯 意图规则</div>
  <div class="sidebar-item" data-page="cs-chats">💬 对话记录</div>
  <div class="sidebar-item" data-page="cs-settings">⚙️ 客服设置</div>

  <div class="sidebar-divider"></div>
  <div class="sidebar-label">🧭 AI 导购助手</div>
  <div class="sidebar-item sg-item" data-page="sg-kb">📚 商品知识库 <span class="badge badge-sg" id="sgKbCount">-</span></div>
  <div class="sidebar-item sg-item" data-page="sg-prompts">✏️ Prompt 模板</div>
  <div class="sidebar-item sg-item" data-page="sg-products">🛍️ 商品目录 <span class="badge badge-sg" id="sgProdCount">-</span></div>
  <div class="sidebar-item sg-item" data-page="sg-profiles">👤 用户画像</div>
  <div class="sidebar-item sg-item" data-page="sg-intents">🎯 意图规则</div>
  <div class="sidebar-item sg-item" data-page="sg-chats">💬 对话记录</div>
  <div class="sidebar-item sg-item" data-page="sg-settings">⚙️ 导购设置</div>

  <div class="sidebar-divider"></div>
  <div class="sidebar-label">系统</div>
  <div class="sidebar-item" data-page="api-settings">🔑 DeepSeek API</div>
</aside>

<!-- ════════════════ MAIN CONTENT ════════════════ -->
<main class="main" id="mainContent">

<!-- ═══════ DASHBOARD ═══════ -->
<div class="page active" id="page-dashboard"></div>

<!-- ═══════ CS KNOWLEDGE BASE ═══════ -->
<div class="page" id="page-cs-kb"></div>

<!-- ═══════ CS PROMPTS ═══════ -->
<div class="page" id="page-cs-prompts"></div>

<!-- ═══════ CS INTENTS ═══════ -->
<div class="page" id="page-cs-intents"></div>

<!-- ═══════ CS CHATS ═══════ -->
<div class="page" id="page-cs-chats"></div>

<!-- ═══════ CS SETTINGS ═══════ -->
<div class="page" id="page-cs-settings"></div>

<!-- ═══════ SG KNOWLEDGE BASE ═══════ -->
<div class="page" id="page-sg-kb"></div>

<!-- ═══════ SG PROMPTS ═══════ -->
<div class="page" id="page-sg-prompts"></div>

<!-- ═══════ SG PRODUCTS ═══════ -->
<div class="page" id="page-sg-products"></div>

<!-- ═══════ SG PROFILES ═══════ -->
<div class="page" id="page-sg-profiles"></div>

<!-- ═══════ SG INTENTS ═══════ -->
<div class="page" id="page-sg-intents"></div>

<!-- ═══════ SG CHATS ═══════ -->
<div class="page" id="page-sg-chats"></div>

<!-- ═══════ SG SETTINGS ═══════ -->
<div class="page" id="page-sg-settings"></div>

<!-- ═══════ API SETTINGS ═══════ -->
<div class="page" id="page-api-settings"></div>

</main>

<!-- ═══════ MODAL OVERLAY ═══════ -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalContent"></div>
</div>

<!-- ═══════ TOAST CONTAINER ═══════ -->
<div class="toast-container" id="toastContainer"></div>

<script>
// ═══════════════════════════════════════════════════════════
//  CORE UTILITIES
// ═══════════════════════════════════════════════════════════
const $ = (s, p) => (p||document).querySelector(s);
const $$ = (s, p) => [...(p||document).querySelectorAll(s)];

function toast(msg, type='success') {
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.innerHTML = msg;
  $('#toastContainer').appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity .3s'; setTimeout(() => el.remove(), 300); }, 2800);
}

async function api(url, opts={}) {
  try {
    const r = await fetch(url, opts);
    if(!r.ok){ const e = await r.json().catch(()=>({})); throw new Error(e.detail || e.message || '请求失败'); }
    return await r.json();
  } catch(e) { toast(e.message, 'error'); throw e; }
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// Debounce for search
function debounce(fn, ms=300) { let t; return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); }; }

// ═══════════════════════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════════════════════
let currentPage = 'dashboard';

const pageRenderers = {
  'dashboard': renderDashboard,
  'cs-kb': () => renderKnowledgeBase('customer_service', 'cs'),
  'cs-prompts': () => renderPrompts('customer_service', 'cs'),
  'cs-intents': () => renderIntents('customer_service', 'cs'),
  'cs-chats': () => renderChats('customer_service', 'cs'),
  'cs-settings': () => renderCSSettings(),
  'sg-kb': () => renderKnowledgeBase('shopping_guide', 'sg'),
  'sg-prompts': () => renderPrompts('shopping_guide', 'sg'),
  'sg-products': renderProducts,
  'sg-profiles': renderProfiles,
  'sg-intents': () => renderIntents('shopping_guide', 'sg'),
  'sg-chats': () => renderChats('shopping_guide', 'sg'),
  'sg-settings': renderSGSettings,
  'api-settings': renderAPISettings,
};

$$('.sidebar-item').forEach(item => {
  item.addEventListener('click', () => {
    const page = item.dataset.page;
    if (!page || page === currentPage) return;
    switchPage(page);
  });
});

function switchPage(page) {
  currentPage = page;
  $$('.sidebar-item').forEach(i => i.classList.remove('active'));
  const navItem = $(`.sidebar-item[data-page="${page}"]`);
  if (navItem) navItem.classList.add('active');
  $$('.page').forEach(p => p.classList.remove('active'));
  const pageEl = $(`#page-${page}`);
  if (pageEl) pageEl.classList.add('active');
  if (pageRenderers[page]) pageRenderers[page]();
  document.getElementById('sidebar').classList.remove('open');
  window.scrollTo({top: 0, behavior: 'smooth'});
}

// ═══════════════════════════════════════════════════════════
//  MODAL
// ═══════════════════════════════════════════════════════════
function openModal(title, bodyHtml, onSave) {
  $('#modalContent').innerHTML = `
    <h3>${title}</h3>
    <div class="modal-body">${bodyHtml}</div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn btn-cs" id="modalSaveBtn">保存</button>
    </div>`;
  $('#modalOverlay').classList.add('open');
  if (onSave) $('#modalSaveBtn').addEventListener('click', async () => {
    await onSave();
    closeModal();
  });
}

function closeModal() {
  $('#modalOverlay').classList.remove('open');
}

$('#modalOverlay').addEventListener('click', e => { if(e.target === $('#modalOverlay')) closeModal(); });
document.addEventListener('keydown', e => { if(e.key === 'Escape') closeModal(); });

// ═══════════════════════════════════════════════════════════
//  DASHBOARD
// ═══════════════════════════════════════════════════════════
async function renderDashboard() {
  const s = await api('/api/admin/stats');
  const csKb = await api('/api/admin/knowledge?limit=1');
  const sgProd = await api('/api/admin/products?limit=1');
  const csChats = await api('/api/admin/chat-history?project=customer_service&limit=1');
  const sgChats = await api('/api/admin/chat-history?project=shopping_guide&limit=1');

  $('#page-dashboard').innerHTML = `
    <div class="page-header"><h1 class="page-title">📊 仪表盘</h1></div>
    <div class="stats-row">
      <div class="stat-card cs"><div class="stat-num">${csKb.total || 0}</div><div class="stat-label">🤖 客服知识条目</div></div>
      <div class="stat-card cs"><div class="stat-num">${csChats.total || 0}</div><div class="stat-label">💬 客服对话记录</div></div>
      <div class="stat-card sg"><div class="stat-num">${sgProd.products ? sgProd.products.length : 0}</div><div class="stat-label">🛍️ 导购商品数量</div></div>
      <div class="stat-card sg"><div class="stat-num">${sgChats.total || 0}</div><div class="stat-label">💬 导购对话记录</div></div>
    </div>
    <div class="card">
      <div class="card-header"><span class="card-title">系统状态</span></div>

let kbState = { project: '', theme: '', page: 1, search: '', category: '' };

async function renderKnowledgeBase(project, theme) {
  kbState = { project, theme, page: 1, search: '', category: '' };
  const cats = await api('/api/admin/categories');
  const colorClass = theme === 'cs' ? 'btn-cs' : 'btn-sg';
  const tagClass = theme === 'cs' ? 'tag-cs' : 'tag-sg';

  $(`#page-${theme}-kb`).innerHTML = `
    <div class="page-header">
      <h1 class="page-title">📚 ${project==='customer_service'?'AI智能客服':'AI导购助手'} · 知识库</h1>
      <div class="page-actions">
        <button class="btn ${colorClass}" onclick="openKbModal('')">+ 新增条目</button>
        <button class="btn" onclick="document.getElementById('importFile${theme}').click()">📥 导入JSON</button>
        <button class="btn" onclick="exportKB('${theme}')">📤 导出</button>
        <input type="file" id="importFile${theme}" accept=".json" style="display:none" onchange="importKB(this,'${theme}')">
      </div>
    </div>
    <div class="card">
      <div class="card-header">
        <span class="card-title">知识条目列表</span>
        <div class="card-tools">
          <select id="kbCatFilter_${theme}" onchange="loadKB()" style="width:auto">
            <option value="">全部分类</option>
            ${cats.map(c => `<option value="${c.id}">${c.name} (${c.entry_count})</option>`).join('')}
          </select>
          <input id="kbSearch_${theme}" placeholder="搜索知识库..." onkeyup="debounce(loadKB,300)()" style="width:200px">
        </div>
      </div>
      <div class="table-wrap" id="kbTable_${theme}"></div>
      <div class="pagination" id="kbPagination_${theme}"></div>
    </div>`;

  $('#kbSearch_' + theme).addEventListener('keyup', debounce(loadKB, 300));
  loadKB();
}

async function loadKB(page) {
  if (page) kbState.page = page;
  const { project, theme } = kbState;
  const cat = $(`#kbCatFilter_${theme}`).value;
  const search = $(`#kbSearch_${theme}`).value;
  const params = new URLSearchParams({ page: kbState.page, limit: 20 });
  if (cat) params.set('category_id', cat);
  if (search) params.set('search', search);

  const data = await api(`/api/admin/knowledge?${params}`);
  const tagClass = theme === 'cs' ? 'tag-cs' : 'tag-sg';

  $(`#kbTable_${theme}`).innerHTML = `<table><thead><tr>
    <th>ID</th><th>分类</th><th>问题</th><th>回答</th><th>关键词</th><th>操作</th>
  </tr></thead><tbody>
    ${data.entries.length === 0 ? `<tr><td colspan="6" class="empty"><div class="empty-icon">📭</div>暂无知识条目</td></tr>` :
      data.entries.map(e => `
        <tr>
          <td>${e.id}</td>
          <td><span class="tag ${tagClass}">${e.category_name||'未分类'}</span></td>
          <td><span class="truncate">${esc(e.question)}</span></td>
          <td><span class="truncate">${esc(e.answer.substring(0,50))}...</span></td>
          <td>${esc((e.keywords||'').substring(0,30))}</td>
          <td><div class="btn-group">
            <button class="btn btn-xs" onclick="openKbModal(${e.id},'${theme}')">编辑</button>
            <button class="btn btn-xs btn-danger" onclick="deleteKB(${e.id})">删除</button>
          </div></td>
        </tr>`).join('')}
  </tbody></table>`;

  const tp = Math.ceil(data.total / 20);
  $(`#kbPagination_${theme}`).innerHTML = `共 ${data.total} 条 · ` +
    (kbState.page > 1 ? `<a onclick="loadKB(${kbState.page-1})">‹ 上一页</a>` : '') +
    ` ${kbState.page}/${tp||1} ` +
    (kbState.page < tp ? `<a onclick="loadKB(${kbState.page+1})">下一页 ›</a>` : '');

  updateCounts();
}

async function openKbModal(id, theme) {
  let entry = { category_id: '', question: '', answer: '', keywords: '' };
  if (id) {
    const data = await api('/api/admin/knowledge?limit=1000');
    entry = data.entries.find(e => e.id === id) || entry;
  }
  const cats = await api('/api/admin/categories');
  openModal(id ? `编辑知识条目 #${id}` : '新增知识条目', `
    <div class="form-row">
      <div class="form-group"><label>分类</label><select id="kbCat">${cats.map(c => `<option value="${c.id}" ${c.id==entry.category_id?'selected':''}>${c.name}</option>`).join('')}<option value="" ${!entry.category_id?'selected':''}>无分类</option></select></div>
      <div class="form-group"><label>关键词 (逗号分隔)</label><input id="kbKw" value="${esc(entry.keywords||'')}" placeholder="关键词1,关键词2"></div>
    </div>
    <div class="form-group"><label>问题</label><input id="kbQ" value="${esc(entry.question)}" placeholder="用户常见问题"></div>
    <div class="form-group"><label>回答</label><textarea id="kbA" placeholder="知识库标准回答" style="min-height:150px">${esc(entry.answer)}</textarea></div>
  `, async () => {
    const data = { category_id: $('#kbCat').value || null, question: $('#kbQ').value.trim(), answer: $('#kbA').value.trim(), keywords: $('#kbKw').value.trim() };
    if (!data.question || !data.answer) { toast('问题和回答不能为空', 'error'); throw new Error('validation'); }
    if (id) await api(`/api/admin/knowledge/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
    else await api('/api/admin/knowledge', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
    loadKB();
    toast(id ? '知识条目已更新' : '知识条目已创建');
  });
}

async function deleteKB(id) {
  if (!confirm('确认删除此知识条目？')) return;
  await api(`/api/admin/knowledge/${id}`, { method: 'DELETE' });
  loadKB();
  toast('已删除');
}

async function importKB(input, theme) {
  const file = input.files[0];
  if (!file) return;
  const form = new FormData(); form.append('file', file);
  const r = await fetch('/api/admin/knowledge/import', { method: 'POST', body: form });
  const data = await r.json();
  loadKB();
  toast(data.message);
  input.value = '';
}

async function exportKB(theme) {
  const data = await api('/api/admin/knowledge/export');
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'knowledge_export.json'; a.click();
}

async function openIntentModal(id, project, theme) {
  let rule = { project, intent_name: '', sub_intent: '', keywords: '', entities: '', priority: 0 };
  if (id) {
    const rules = await api(`/api/admin/intent-rules?project=${project}`);
    rule = rules.find(r => r.id === id) || rule;
  }
  openModal(id ? '编辑意图规则' : '新增意图规则', `
    <div class="form-row">
      <div class="form-group"><label>意图名称</label><input id="intentName" value="${esc(rule.intent_name)}"></div>
      <div class="form-group"><label>子意图</label><input id="intentSub" value="${esc(rule.sub_intent||'')}"></div>
    </div>
    <div class="form-group"><label>关键词 (逗号分隔)</label><input id="intentKw" value="${esc(rule.keywords)}" placeholder="退款,退费,退钱,退货"></div>
    <div class="form-row">
      <div class="form-group"><label>实体 (逗号分隔)</label><input id="intentEntities" value="${esc(rule.entities||'')}" placeholder="订单,金额"></div>
      <div class="form-group"><label>优先级 (越大越优先)</label><input id="intentPriority" type="number" value="${rule.priority||0}"></div>
    </div>
  `, async () => {
    const data = { project, intent_name: $('#intentName').value.trim(), sub_intent: $('#intentSub').value.trim(), keywords: $('#intentKw').value.trim(), entities: $('#intentEntities').value.trim(), priority: parseInt($('#intentPriority').value)||0 };
    if (!data.intent_name || !data.keywords) { toast('意图名称和关键词不能为空', 'error'); throw new Error('validation'); }
    if (id) await api(`/api/admin/intent-rules/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
    else await api('/api/admin/intent-rules', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
    renderIntents(project, theme);
    toast('意图规则已保存');
  });
}

async function deleteIntent(id, project, theme) {
  if (!confirm('确认删除此意图规则？')) return;
  await api(`/api/admin/intent-rules/${id}`, { method: 'DELETE' });
  renderIntents(project, theme);
  toast('已删除');
}

    const data = { name:$('#prodName').value.trim(),emoji:$('#prodEmoji').value.trim()||'📦',price:parseFloat($('#prodPrice').value)||0,original_price:parseFloat($('#prodOrig').value)||0,tags:$('#prodTags').value.trim(),match_score:parseFloat($('#prodScore').value)||0.8,reason:$('#prodReason').value.trim(),category:$('#prodCat').value.trim()||'综合'};
    if (!data.name || !data.price) { toast('名称和价格不能为空','error'); throw new Error('validation'); }
    if (id) await api(`/api/admin/products/${id}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
    else await api('/api/admin/products',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
    renderProducts();
    toast('商品已保存');
  });
}

async function deleteProduct(id) {
  if (!confirm('确认删除此商品？')) return;
  await api(`/api/admin/products/${id}`, { method: 'DELETE' });
  renderProducts();
  toast('已删除');
}

// ═══════════════════════════════════════════════════════════
//  USER PROFILES
// ═══════════════════════════════════════════════════════════
async function renderProfiles() {
  const data = await api('/api/admin/profiles');
  $('#page-sg-profiles').innerHTML = `
    <div class="page-header">
      <h1 class="page-title">👤 用户画像管理</h1>
      <button class="btn btn-sg" onclick="openProfileModal('')">+ 新增画像</button>
    </div>
    <div class="card"><div class="table-wrap"><table><thead><tr><th>ID</th><th>名称</th><th>RFM分层</th><th>偏好</th><th>预算</th><th>水平</th><th>操作</th></tr></thead><tbody>
      ${!data || data.length === 0 ? `<tr><td colspan="7" class="empty"><div class="empty-icon">👤</div>暂无用户画像</td></tr>` :
        data.map(p => `
          <tr>
            <td><code>${p.id}</code></td>
            <td style="font-weight:600">${esc(p.name)}</td>
            <td><span class="tag tag-sg">${esc(p.rfm_segment||'')}</span></td>
            <td>${(p.preferences||'').split(',').filter(Boolean).map(t=>`<span class="tag tag-neutral">${t.trim()}</span>`).join(' ')}</td>
            <td>${p.budget||'-'}</td>
            <td>${p.level||'-'}</td>
            <td><div class="btn-group">
              <button class="btn btn-xs" onclick="openProfileModal('${p.id}')">编辑</button>
              <button class="btn btn-xs btn-danger" onclick="deleteProfile('${p.id}')">删除</button>
            </div></td>
          </tr>`).join('')}
    </tbody></table></div></div>`;
}

async function openProfileModal(id) {
  let p = { id:'',name:'',rfm_segment:'',preferences:'',budget:'',level:''};
  if (id) {
    const data = await api('/api/admin/profiles');
    p = data.find(x => x.id === id) || p;
  }
  openModal(id ? '编辑用户画像' : '新增用户画像', `
    <div class="form-row">
      <div class="form-group"><label>ID (字母数字)</label><input id="profId" value="${esc(p.id)}" ${id?'readonly':''}></div>
      <div class="form-group"><label>名称</label><input id="profName" value="${esc(p.name||'')}"></div>
    </div>
    <div class="form-group"><label>RFM分层标签</label><input id="profRfm" value="${esc(p.rfm_segment||'')}"></div>
    <div class="form-group"><label>偏好 (逗号分隔)</label><input id="profPrefs" value="${esc(p.preferences||'')}"></div>
    <div class="form-row">
      <div class="form-group"><label>预算水平</label><select id="profBudget"><option value="低" ${p.budget==='低'?'selected':''}>低</option><option value="中" ${p.budget==='中'?'selected':''}>中</option><option value="中高" ${p.budget==='中高'?'selected':''}>中高</option><option value="高" ${p.budget==='高'?'selected':''}>高</option></select></div>
      <div class="form-group"><label>健身水平</label><select id="profLevel"><option value="新手" ${p.level==='新手'?'selected':''}>新手</option><option value="中级" ${p.level==='中级'?'selected':''}>中级</option><option value="高级" ${p.level==='高级'?'selected':''}>高级</option></select></div>
    </div>
  `, async () => {
    const data = { id:$('#profId').value.trim(),name:$('#profName').value.trim(),rfm_segment:$('#profRfm').value.trim(),preferences:$('#profPrefs').value.trim(),budget:$('#profBudget').value,level:$('#profLevel').value};
    if (!data.id||!data.name){toast('ID和名称不能为空','error');throw new Error('validation');}
    if (id) await api(`/api/admin/profiles/${id}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
    else await api('/api/admin/profiles',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
    renderProfiles();
    toast('用户画像已保存');
  });
}

async function deleteProfile(id) {
  if (!confirm('确认删除此用户画像？')) return;
  await api(`/api/admin/profiles/${id}`, { method: 'DELETE' });
  renderProfiles();
  toast('已删除');
}

      <div class="card-header"><span class="card-title">推荐策略权重</span></div>

            <label>回复温度</label>

// ═══════════════════════════════════════════════════════════
//  API SETTINGS
// ═══════════════════════════════════════════════════════════
async function renderAPISettings() {
  const s = await api('/api/admin/settings');
  $('#page-api-settings').innerHTML = `
    <div class="page-header"><h1 class="page-title">🔑 DeepSeek API 配置</h1></div>
    <div class="card">
      <div class="card-header"><span class="card-title">API 连接设置</span></div>
      <div class="card-body">
        <div class="form-group"><label>API Key</label><input type="password" id="apiKey" value="${esc(s.deepseek_api_key||'')}" placeholder="sk-..."></div>
        <div class="hint">获取 API Key: <a href="https://platform.deepseek.com/api_keys" target="_blank" style="color:var(--cs)">platform.deepseek.com/api_keys</a> · 新用户赠送 500万 tokens</div>
        <div class="form-group" style="margin-top:14px"><label>模 型</label><select id="apiModel"><option value="deepseek-chat" ${s.deepseek_model==='deepseek-chat'?'selected':''}>deepseek-chat (通用对话)</option><option value="deepseek-reasoner" ${s.deepseek_model==='deepseek-reasoner'?'selected':''}>deepseek-reasoner (深度推理)</option></select></div>
        <div style="margin-top:16px">
          <button class="btn btn-cs" onclick="saveAPISettings()">保存配置</button>
          <button class="btn btn-outline-cs" style="margin-left:8px" onclick="testAPIConnection()">🔍 测试连接</button>
        </div>
        <div id="apiTestResult" style="margin-top:12px"></div>
      </div>
    </div>`;
}

async function saveAPISettings() {
  await api('/api/admin/settings', {
    method: 'PUT', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      deepseek_api_key: $('#apiKey').value.trim(),
      deepseek_model: $('#apiModel').value,
    })
  });
  toast('API 配置已保存');
}

async function testAPIConnection() {
  const key = $('#apiKey').value.trim();
  if (!key) { toast('请先填写 API Key', 'error'); return; }
  $('#apiTestResult').innerHTML = '<span style="color:var(--cs)">⏳ 正在测试连接...</span>';
  try {
    const r = await fetch('https://api.deepseek.com/v1/models', { headers: { 'Authorization': `Bearer ${key}` } });
    if (r.ok) {
      $('#apiTestResult').innerHTML = '<span style="color:var(--sg);font-weight:600">✅ 连接成功！API Key 有效</span>';
      toast('API 连接测试通过');
    } else {
      const err = await r.json().catch(()=>({}));
      $('#apiTestResult').innerHTML = `<span style="color:var(--danger);font-weight:600">❌ 连接失败: ${err.error?.message || r.statusText}</span>`;
    }
  } catch(e) {
    $('#apiTestResult').innerHTML = `<span style="color:var(--danger);font-weight:600">❌ 网络错误: ${e.message}</span>`;
  }
}

// ═══════════════════════════════════════════════════════════
//  COUNTS
// ═══════════════════════════════════════════════════════════
async function updateCounts() {
  try {
    const csKb = await api('/api/admin/knowledge?limit=1');
    const sgProd = await api('/api/admin/products');
    const csKbEl = $('#csKbCount'); if (csKbEl) csKbEl.textContent = csKb.total || 0;
    const sgKbEl = $('#sgKbCount'); if (sgKbEl) sgKbEl.textContent = csKb.total || 0;
    const sgProdEl = $('#sgProdCount'); if (sgProdEl) sgProdEl.textContent = (sgProd.products||[]).length;
  } catch(e) {}
}

// ═══════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════
renderDashboard();
updateCounts();
</script>
</body>
