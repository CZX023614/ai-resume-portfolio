<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI智能客服系统 · RAG + 多轮对话</title>
<style>
:root {
  --bg: #faf8f5; --card: #ffffff; --card2: #fefbf7; --border: #e8e2d8;
  --text: #2c2416; --dim: #8a7e6b; --accent: #d4913e; --accent2: #e8784a;
  --gold: #c8872b; --warm: #f0a050; --teal: #2d9d8c; --rose: #d4687c;
  --green: #2d9d6c; --red: #d9534f;
  --shadow: 0 2px 16px rgba(60,40,20,0.06);
  --shadow-lg: 0 8px 40px rgba(60,40,20,0.10);
  --radius: 16px; --radius-sm: 10px; --radius-xs: 6px;
  --font: 'Inter', 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
  --mono: 'SF Mono', 'JetBrains Mono', 'Consolas', monospace;
  --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 15px; line-height: 1.6; overflow-x: hidden; min-height: 100vh; }
.bg-orb { position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; filter: blur(120px); opacity: 0.5; }
.bg-orb-1 { width: 500px; height: 500px; background: #fce4c8; top: -150px; right: -100px; animation: float1 12s ease-in-out infinite; }
.bg-orb-2 { width: 400px; height: 400px; background: #f5e0d0; bottom: -100px; left: -80px; animation: float2 10s ease-in-out infinite; }
.bg-orb-3 { width: 300px; height: 300px; background: #e8e0d5; top: 50%; left: 50%; animation: float3 14s ease-in-out infinite; }
@keyframes float1 { 0%,100% { transform: translate(0,0) } 50% { transform: translate(-40px,30px) } }
@keyframes float2 { 0%,100% { transform: translate(0,0) } 50% { transform: translate(30px,-25px) } }
@keyframes float3 { 0%,100% { transform: translate(0,0) } 50% { transform: translate(-20px,-20px) } }
.app { position: relative; z-index: 1; max-width: 1400px; margin: 0 auto; padding: 24px 20px 60px; }
.topbar { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; background: rgba(255,255,255,0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-radius: 99px; border: 1px solid var(--border); margin-bottom: 28px; position: sticky; top: 12px; z-index: 100; box-shadow: var(--shadow); }
.topbar-logo { font-weight: 800; font-size: 15px; color: var(--accent); letter-spacing: -0.5px; }
.section-head { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
.section-icon { width: 34px; height: 34px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
.section-icon.skills { background: #fef5eb; color: var(--accent); }
.section-title { font-size: 18px; font-weight: 700; color: var(--text); letter-spacing: -0.5px; }
.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
@media (max-width: 768px) { .app { padding: 12px; } .topbar { flex-wrap: wrap; gap: 8px; justify-content: center; border-radius: 20px; } }

.layout { display: grid; grid-template-columns: 1fr 380px; gap: 20px; margin: 20px 0; }
@media (max-width: 900px) { .layout { grid-template-columns: 1fr; } }
.chat-panel { display: flex; flex-direction: column; height: 620px; }
.chat-messages { flex: 1; overflow-y: auto; padding: 16px; background: var(--card2); border-radius: var(--radius); margin-bottom: 12px; display: flex; flex-direction: column; gap: 12px; }
.chat-bubble { max-width: 85%; padding: 12px 16px; border-radius: 14px; font-size: 14px; line-height: 1.65; animation: fadeIn 0.3s ease; }
.chat-bubble.user { align-self: flex-end; background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
.chat-bubble.ai { align-self: flex-start; background: var(--card); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
.chat-bubble.ai b { color: var(--accent); }
.chat-input-row { display: flex; gap: 8px; }
.chat-input-row input { flex: 1; padding: 12px 16px; border-radius: 99px; border: 1px solid var(--border); font-size: 14px; font-family: var(--font); background: var(--card); outline: none; transition: var(--transition); }
.chat-input-row input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(212,145,62,0.1); }
.chat-input-row button { padding: 10px 24px; border-radius: 99px; background: var(--accent); color: #fff; border: none; cursor: pointer; font-weight: 600; font-family: var(--font); font-size: 14px; transition: var(--transition); }
.chat-input-row button:hover { background: var(--gold); }
.chat-input-row button:disabled { opacity: 0.5; cursor: not-allowed; }

.pipeline { display: flex; flex-direction: column; gap: 14px; }
.pipeline-card { background: var(--card); border-radius: var(--radius); padding: 16px 18px; box-shadow: var(--shadow); border: 1px solid transparent; transition: var(--transition); }
.pipeline-card.active { border-color: var(--accent); box-shadow: var(--shadow-lg); }
.pipeline-card h4 { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; color: var(--accent); text-transform: uppercase; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
.pipeline-card h4 .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); animation: pulse 1.5s ease infinite; }
@keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: 0.3 } }
.intent-badge { display: inline-block; padding: 4px 12px; border-radius: 99px; font-size: 12px; font-weight: 600; margin: 2px 4px 2px 0; }
.intent-main { background: #fef5eb; color: var(--accent); }
.intent-sub { background: var(--card2); color: var(--dim); border: 1px solid var(--border); }
.entity-tag { display: inline-block; padding: 3px 10px; border-radius: 99px; font-size: 11px; background: rgba(45,157,140,0.08); color: var(--teal); margin: 2px 4px 2px 0; }
.conf-meter { width: 100%; }
.conf-bar { width: 100%; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
.conf-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease, background 0.6s ease; }
.conf-text { display: flex; justify-content: space-between; font-size: 11px; margin-top: 4px; color: var(--dim); }
.rag-item { padding: 8px 12px; margin: 6px 0; background: var(--card2); border-radius: var(--radius-sm); font-size: 12px; cursor: default; transition: var(--transition); }
.rag-item:hover { background: #fef5eb; }
.rag-item .cat { font-size: 10px; color: var(--accent); font-weight: 600; }
.rag-item .q { color: var(--text); margin-top: 2px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.handoff-alert { padding: 12px 16px; border-radius: var(--radius-sm); font-size: 12px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
.handoff-safe { background: rgba(45,157,108,0.08); color: var(--green); border: 1px solid rgba(45,157,108,0.2); }
.handoff-warn { background: rgba(212,104,124,0.08); color: var(--rose); border: 1px solid rgba(212,104,124,0.2); }
.chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
.chip { padding: 6px 14px; border-radius: 99px; border: 1px solid var(--border); background: var(--card); cursor: pointer; font-size: 12px; font-family: var(--font); color: var(--dim); transition: var(--transition); }
.chip:hover { background: #fef5eb; color: var(--accent); border-color: var(--accent); }
.pipeline-placeholder { text-align: center; color: var(--dim); padding: 60px 20px; background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); }
.pipeline-placeholder .icon { font-size: 40px; margin-bottom: 10px; opacity: 0.5; }
.stats-bar { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 16px; }
.stat-item { background: var(--card); border-radius: var(--radius-sm); padding: 12px 14px; text-align: center; box-shadow: var(--shadow); }
.stat-num { font-size: 20px; font-weight: 800; color: var(--accent); font-family: var(--mono); }
.stat-label { font-size: 10px; color: var(--dim); margin-top: 2px; }
</style>
</head>
<body>
<div class="bg-orb bg-orb-1"></div><div class="bg-orb bg-orb-2"></div><div class="bg-orb bg-orb-3"></div>

<div class="app">
<nav class="topbar"><span class="topbar-logo">蔡子贤 · AI智能客服</span><div><a href="#" id="backToResume" style="text-decoration:none;font-size:12px;color:var(--dim);padding:6px 14px;border-radius:99px;border:1px solid var(--border);transition:var(--transition);margin-right:8px">← 返回简历</a><a href="#" id="adminLink" style="text-decoration:none;font-size:12px;color:var(--dim);padding:6px 14px;border-radius:99px;border:1px solid var(--border);transition:var(--transition)">⚙️ 管理后台</a></div></nav>

<div class="section-head"><div class="section-icon skills">🤖</div><h2 class="section-title">AI智能客服系统 · LLM + RAG + 多轮对话</h2></div>

<div class="stats-bar">
  <div class="stat-item"><div class="stat-num">90%</div><div class="stat-label">自主解决率</div></div>
  <div class="stat-item"><div class="stat-num">12s</div><div class="stat-label">平均响应时间</div></div>
  <div class="stat-item"><div class="stat-num">87%</div><div class="stat-label">人效提升</div></div>
</div>

<div class="layout">
  <div class="chat-panel">
    <div class="chips">
      <button class="chip" onclick="quickAsk('我想退款，怎么操作？')">退款咨询</button>
      <button class="chip" onclick="quickAsk('怎么预约团课？')">约课问题</button>
      <button class="chip" onclick="quickAsk('年卡和月卡有什么区别？')">会员卡对比</button>
      <button class="chip" onclick="quickAsk('门店的营业时间是几点到几点？')">门店查询</button>
      <button class="chip" onclick="quickAsk('账号被冻结了怎么办？')">账户问题</button>
    </div>
    <div class="chat-messages" id="chatMessages">
      <div class="chat-bubble ai">👋 您好！我是<b>乐刻AI智能客服小乐</b>。<br>我可以帮您解答关于会员卡、约课、退款、门店、账户等相关问题。<br><br><span style="font-size:12px;color:var(--dim)">💡 右侧面板将实时展示AI处理Pipeline：意图识别→RAG检索→置信度评分</span></div>
    </div>
    <div class="chat-input-row">
      <input type="text" id="chatInput" placeholder="输入您的问题..." onkeydown="if(event.key==='Enter')sendMsg()">
      <button onclick="sendMsg()" id="sendBtn">发送</button>
    </div>
  </div>
  <div class="pipeline" id="pipeline">
    <div class="pipeline-placeholder" id="pipelinePlaceholder">
      <div class="icon">🔍</div><div>发送消息后<br>Pipeline将在这里实时展示</div><div style="font-size:11px;margin-top:8px">意图识别 → RAG检索 → 置信度评分</div>
    </div>
  </div>
</div>
</div>

<script>
document.getElementById('backToResume').href = 'https://resumeczx.netlify.app/';
document.getElementById('adminLink').href = API_BASE + '/admin';

// ⚙️ 后端API地址 — 部署时修改为实际服务器地址
var API_BASE = '';

var sessionId = localStorage.getItem('cs_session') || '';
var isStreaming = false;

function addMsg(role, text) {
  var div = document.createElement('div');
  div.className = 'chat-bubble ' + role;
  div.innerHTML = text;
  document.getElementById('chatMessages').appendChild(div);
  document.getElementById('chatMessages').scrollTop = document.getElementById('chatMessages').scrollHeight;
  return div;
}

async function sendMsg() {
  if (isStreaming) return;
  var input = document.getElementById('chatInput');
  var msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  addMsg('user', msg);
  isStreaming = true;
  document.getElementById('sendBtn').disabled = true;

  var aiDiv = addMsg('ai', '<span class="spinner"></span> 正在分析并检索知识库...');
  var fullText = '';

  try {
    var resp = await fetch(API_BASE + '/api/customer-service/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({session_id: sessionId, message: msg}),
    });
    var reader = resp.body.getReader();
    var decoder = new TextDecoder();
    var buffer = '';

    while (true) {
      var result = await reader.read();
      if (result.done) break;
      buffer += decoder.decode(result.value, {stream: true});
      var lines = buffer.split('\n');
      buffer = lines.pop() || '';
      var eventType = '';
      for (var i = 0; i < lines.length; i++) {
        var line = lines[i];
        if (line.startsWith('event: ')) { eventType = line.slice(7); continue; }
        if (!line.startsWith('data: ')) continue;
        try {
          var data = JSON.parse(line.slice(6));
          if (eventType === 'pipeline') {
            updatePipeline(data);
          } else if (eventType === 'token' && data.text) {
            fullText += data.text;
            aiDiv.innerHTML = formatText(fullText);
            document.getElementById('chatMessages').scrollTop = document.getElementById('chatMessages').scrollHeight;
          } else if (eventType === 'confidence') {
            updateConfidence(data);
          } else if (eventType === 'done') {
            sessionId = data.session_id;
            localStorage.setItem('cs_session', sessionId);
            if (!fullText) aiDiv.innerHTML = '抱歉，回复出错，请重试。';
          }
        } catch(e) {}
      }
    }
  } catch(e) {
    aiDiv.innerHTML = '⚠️ 请求失败：' + e.message;
  }
  isStreaming = false;
  document.getElementById('sendBtn').disabled = false;
}

function updatePipeline(data) {
  var panel = document.getElementById('pipeline');
  var placeholder = document.getElementById('pipelinePlaceholder');
  if (placeholder) placeholder.remove();
  var intent = data.intent || '未知', sub = data.sub_intent || '', entities = data.entities || [], sentiment = data.sentiment || 'neutral';
  var sentMap = {positive:'😊 正面', neutral:'😐 中性', negative:'😞 负面', urgent:'🚨 紧急'};
  var conf = data.confidence || {}, rags = data.rag_sources || [];

  var html = '<div class="pipeline-card active"><h4><span class="dot"></span>意图识别</h4><div><span class="intent-badge intent-main">' + intent + '</span>' + (sub ? '<span class="intent-badge intent-sub">' + sub + '</span>' : '') + '</div><div style="margin-top:8px">' + (entities.map(function(e){ return '<span class="entity-tag">' + e + '</span>'; }).join('') || '<span style="font-size:12px;color:var(--dim)">无实体</span>') + '</div><div style="font-size:11px;color:var(--dim);margin-top:8px">情感倾向: ' + (sentMap[sentiment] || sentiment) + '</div></div>';
  html += '<div class="pipeline-card"><h4>📚 RAG知识库检索</h4>' + rags.map(function(r){ return '<div class="rag-item"><div class="cat">' + r.category + ' · 匹配度 ' + (r.score*100).toFixed(0) + '%</div><div class="q">' + r.question + '</div></div>'; }).join('') + '<div style="font-size:10px;color:var(--dim);margin-top:8px">Top ' + rags.length + ' 匹配结果，基于TF-IDF关键词检索</div></div>';
  html += '<div class="pipeline-card" id="confidenceCard"><h4>📊 置信度评分</h4><div class="conf-meter"><div class="conf-bar"><div class="conf-fill" id="confFill" style="width:' + ((conf.score||0)*100) + '%;background:' + confColor(conf.score||0) + '"></div></div><div class="conf-text"><span>置信度</span><span style="font-weight:700;color:' + confColor(conf.score||0) + '">' + ((conf.score||0)*100).toFixed(0) + '%</span></div></div><div class="handoff-alert ' + (conf.auto_handoff ? 'handoff-warn' : 'handoff-safe') + '">' + (conf.auto_handoff ? '⚠️ 置信度不足，建议转人工客服' : '✅ 置信度充足，AI可独立处理') + '</div></div>';
  panel.innerHTML = html;
}

function updateConfidence(data) {
  var fill = document.getElementById('confFill');
  if (fill) { fill.style.width = ((data.score||0)*100) + '%'; fill.style.background = confColor(data.score||0); }
}

function confColor(s) { if (s >= 0.85) return 'var(--teal)'; if (s >= 0.75) return 'var(--accent)'; return 'var(--rose)'; }

function quickAsk(text) { document.getElementById('chatInput').value = text; sendMsg(); }

function formatText(text) { return text.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>').replace(/\n/g, '<br>'); }
</script>
</body>
</html>
